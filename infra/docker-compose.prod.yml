services:
  db:
    image: postgres:16.6-alpine
    container_name: delivery_db
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: ${POSTGRES_USER:?Database user is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - delivery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend/Dockerfile
    container_name: delivery_backend
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/delivery_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Database user is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:?JWT secret is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS origins are required}
      FRONTEND_URL: ${FRONTEND_URL:?Frontend URL is required}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - delivery-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/frontend/Dockerfile
    container_name: delivery_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - delivery-network

networks:
  delivery-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
