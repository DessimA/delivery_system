# ConfiguraĂ§Ăµes do Banco de Dados PostgreSQL para produĂ§Ă£o
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/delivery_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate

# ConfiguraĂ§Ăµes do Servidor
server.port=${SERVER_PORT:8080}

spring.jpa.show-sql=false

# ConfiguraĂ§Ăµes JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ConfiguraĂ§Ăµes CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# ConfiguraĂ§Ăµes CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}