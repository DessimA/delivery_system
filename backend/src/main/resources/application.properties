# Ativar profile de desenvolvimento por padrão
spring.profiles.active=dev

# Carregar variaveis do arquivo .env na raiz do projeto
spring.dotenv.location=../.env
spring.dotenv.ignore-missing=true

# Server
server.port=${SERVER_PORT:8080}

# Configurações do Banco de Dados PostgreSQL para desenvolvimento
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/delivery_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# Configurações JPA comuns
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Caminho para o diretorio de upload de imagens de produtos
file.upload-dir=uploads/

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Configurações JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Configurações CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081}
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Actuator - only health and info exposed
management.endpoints.web.exposure.include=health,info

# Performance - Virtual Threads (JDK 21+)
spring.threads.virtual.enabled=true
spring.thread-executor=virtual

# Payment - PIX simulation
payment.pix.expiration-minutes=30
