# Ativar profile de desenvolvimento por padrão
spring.profiles.active=dev

# Configurações do Banco de Dados PostgreSQL para desenvolvimento
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/delivery_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

# Configurações JPA comuns
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Caminho para o diretório de upload de imagens de produtos
file.upload-dir=uploads/

# Configurações JWT
app.jwt.secret=${JWT_SECRET:ZGV2U2VjcmV0S2V5Rm9ySldUU2lnbmluZ1B1cnBvc2VzMTIzNDU2Nzg5MA==}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Configurações CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081}
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging de segurança para debug
logging.level.org.springframework.security=TRACE
management.endpoints.web.exposure.include=*

# Performance - Virtual Threads (JDK 21+)
spring.threads.virtual.enabled=true
spring.thread-executor=virtual
