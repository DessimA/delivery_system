# Configuração de Logging para Testes
# Reduz o ruído mantendo apenas o essencial para diagnóstico

# Log raiz em WARN para suprimir mensagens informativas de bibliotecas de terceiros
logging.level.root=WARN

# Log da aplicação em DEBUG para capturar detalhes importantes em caso de erro
logging.level.com.delivery=DEBUG

# Spring Framework e Boot em WARN/ERROR para evitar o "banner" e logs de inicialização excessivos
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.test=WARN

# Suprime logs excessivos de Hibernate e Flyway durante testes
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=ERROR

# Suprime logs informativos de pool de conexões
logging.level.com.zaxxer.hikari=ERROR

# Formato simplificado
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
