# Configurações de Teste
spring.main.banner-mode=off
spring.main.log-startup-info=false
logging.level.org.springframework.test.context.cache=warn

# Configurações do Banco de Dados H2 para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Configurações JWT
app.jwt.secret=ZGV2U2VjcmV0S2V5Rm9ySldUU2lnbmluZ1B1cnBvc2VzMTIzNDU2Nzg5MA==
app.jwt.expiration-ms=86400000

# Configurações CORS
app.cors.allowed-origins=http://localhost:5173
frontend.url=http://localhost:5173

# Cloudinary
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test
